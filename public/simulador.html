<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Chatbot - CarFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --chat-bg: #0b141a;
      --chat-header: #202c33;
      --bubble-me: #005c4b;
      --bubble-bot: #202c33;
      --accent: #c9a227;
      --text-main: #e9edef;
    }
    body {
      background-color: transparent;
      margin: 0;
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 600px;
      background-color: var(--chat-bg);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .chat-header {
      background-color: var(--chat-header);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .bot-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #c9a227 0%, #f4e4bc 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
      font-size: 20px;
    }
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-blend-mode: overlay;
    }
    .message {
      margin-bottom: 12px;
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
      white-space: pre-wrap;
    }
    .message.bot {
      align-self: flex-start;
      background-color: var(--bubble-bot);
      border-top-left-radius: 0;
    }
    .message.me {
      align-self: flex-end;
      background-color: var(--bubble-me);
      border-top-right-radius: 0;
      margin-left: auto;
    }
    .chat-input-area {
      background-color: #202c33;
      padding: 10px 15px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      background-color: #2a3942;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      outline: none;
    }
    .btn-send {
      background: none;
      border: none;
      color: #8696a0;
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .btn-send:hover { color: var(--accent); }
    
    .typing {
      font-style: italic;
      font-size: 12px;
      color: #8696a0;
      margin-bottom: 5px;
      display: none;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
    }
    .suggestion-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 15px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-btn:hover {
      background: var(--accent);
      color: #000;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="bot-avatar">
      <i class="bi bi-robot"></i>
    </div>
    <div>
      <div style="font-weight: 600; font-size: 15px;">Assistente Virtual</div>
      <div style="font-size: 12px; color: #8696a0;">Online (Simulador)</div>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="message bot">Olá! Eu sou o assistente da Caio Veículos. Como posso te ajudar hoje?</div>
  </div>

  <div class="typing" id="typing-indicator" style="padding-left: 20px;">O robô está processando...</div>

  <div class="suggestions">
    <button class="suggestion-btn" onclick="sendPrompt('Quero ver os carros')">🚗 Ver Estoque</button>
    <button class="suggestion-btn" onclick="sendPrompt('Quero vender meu carro')">💰 Vender Carro</button>
    <button class="suggestion-btn" onclick="sendPrompt('Falar com atendente')">👨‍💼 Atendimento Humano</button>
  </div>

  <form class="chat-input-area" id="chat-form">
    <input type="text" class="chat-input" id="message-input" placeholder="Digite uma mensagem para testar..." autocomplete="off">
    <button type="submit" class="btn-send">
      <i class="bi bi-send-fill"></i>
    </button>
  </form>
</div>

<script>
  const chatMessages = document.getElementById('chat-messages');
  const chatForm = document.getElementById('chat-form');
  const messageInput = document.getElementById('message-input');
  const typingIndicator = document.getElementById('typing-indicator');

  const userId = 'sim-user-' + Math.random().toString(36).substr(2, 9);
  
  const urlParams = new URLSearchParams(window.location.search);
  const slugParam = urlParams.get('slug');

  // Ajustar saudação inicial baseada na loja
  if (slugParam) {
    const storeName = slugParam.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    document.querySelector('.message.bot').innerText = `Olá! Eu sou o assistente da ${storeName}. Como posso te ajudar hoje?`;
  }

  function api(path) {
    // Se estiver no admin, pega o slug da URL. Se estiver na loja, pega do path.
    const slug = slugParam || window.parent.location.pathname.split('/')[1] || 'caio-veiculos';
    return `/api/${slug}${path}`;
  }

  function addMessage(text, type) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${type}`;
    msgDiv.innerText = text;
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function sendPrompt(text) {
    messageInput.value = text;
    chatForm.dispatchEvent(new Event('submit'));
  }

  chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = messageInput.value.trim();
    if (!message) return;

    addMessage(message, 'me');
    messageInput.value = '';
    
    typingIndicator.style.display = 'block';

    try {
      const resp = await fetch(api('/bot/simulate'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, userId })
      });
      const data = await resp.json();
      
      setTimeout(() => {
        typingIndicator.style.display = 'none';
        addMessage(data.response, 'bot');
      }, 800);
      
    } catch (error) {
      typingIndicator.style.display = 'none';
      addMessage('Erro ao conectar com o servidor. Verifique se o backend está rodando.', 'bot');
    }
  });
</script>

</body>
</html>
